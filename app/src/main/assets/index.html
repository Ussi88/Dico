function _peUpdateUI(){
  document.querySelectorAll('.ptool').forEach(btn=>{
    const t=btn.getAttribute('data-tool');
    if(t) btn.classList.toggle('active', t===_pe.tool && !_pe.activeComp && _pe.movingIdx===null);
  });
  document.querySelectorAll('.pcolor').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('data-color')===_pe.color);
  });
  document.querySelectorAll('.pe-comp-tile').forEach(el=>{
    const active = el.getAttribute('data-id')===_pe.activeComp;
    el.style.borderColor=active?'var(--navy)':'var(--border)';
    el.style.background=active?'#EEF4FF':'#fff';
  });
  peUpdateTouchAction();
  const panBadge=document.getElementById('pe-pan-badge');
  if(panBadge) panBadge.style.display = peIsInteractiveMode() ? 'none' : 'inline-flex';
  const hint=document.getElementById('pe-hint');
  const _pinIc='<span style="display:inline-flex;width:14px;height:14px;vertical-align:-2px;margin-right:4px">'+ICONS.pin+'</span>';
  const _infoIc='<span style="display:inline-flex;width:14px;height:14px;vertical-align:-2px;margin-right:4px">'+ICONS.info+'</span>';
  const _moveIc='<span style="display:inline-flex;width:14px;height:14px;vertical-align:-2px;margin-right:4px">'+ICONS.move+'</span>';
  if(hint) hint.innerHTML = _pe.movingIdx!==null
    ? _pinIc+'Tocca il punto della planimetria dove vuoi spostare il componente.'
    : _pe.activeComp
      ? _pinIc+'Tocca sulla planimetria per posizionare il componente.'
      : _pe.tool
        ? _infoIc+'Strumento attivo: tocca e trascina per disegnare (o trascina un\'icona già posizionata per spostarla). Tocca di nuovo lo strumento per scorrere la planimetria.'
        : _moveIc+'Modalità navigazione: scorri o pizzica per spostarti. Trascina un\'icona per spostarla, toccala per ruotarla/ridimensionarla/eliminarla.';
}

// ---- Save / load background ----
function peSave(){
  const canvas=_pe.canvas;
  if(!canvas){ navBack(); return; }
  // Clear any selection UI (line handles, component highlight) before the final composite —
  // these are editing aids and must never end up baked into the exported document image.
  _pe.selectedLineIdx=null;
  _pe.ctxMenuIdx=null;
  const oldMenu=document.getElementById('pe-ctx-menu'); if(oldMenu) oldMenu.remove();
  const oldDel=document.getElementById('pe-line-del-btn'); if(oldDel) oldDel.remove();
  // Composite once more to make sure all components are rendered
  peComposite();
  // Give the canvas a tick to finish async drawImage calls
  setTimeout(()=>{
    // The flattened preview is only ever used for display/print, never for re-editing
    // (that uses bgDataUrl + freehandDataUrl + components separately) — so once there's a
    // photographic background baked in, JPEG is a much smaller, print-quality-enough choice
    // than a lossless PNG of the same pixels. Pure hand-drawn plans (no background photo)
    // stay PNG, since flat line art compresses better losslessly and shouldn't get JPEG noise.
    const previewDataUrl = _pe.bgImage ? canvas.toDataURL('image/jpeg', 0.85) : canvas.toDataURL('image/png');
    const freehandDataUrl=_pe.freehandCanvas ? _pe.freehandCanvas.toDataURL('image/png') : '';
    draft.piantine=draft.piantine||[];
    const nomeInput=document.getElementById('pe-plan-nome');
    const nome=((nomeInput?nomeInput.value:_pe.editingPlanNome)||'').trim() || `Planimetria ${draft.piantine.length+1}`;
    const planFields={
      nome,
      bgDataUrl:_pe.bgDataUrl||'',
      canvasW:canvas.width, canvasH:canvas.height,
      freehandDataUrl,
      components:JSON.parse(JSON.stringify(_pe.components)),
      lines:JSON.parse(JSON.stringify(_pe.lines)),
      previewDataUrl,
      updatedAt:new Date().toISOString()
    };
    const idx=_pe.editingPlanId ? draft.piantine.findIndex(p=>p.id===_pe.editingPlanId) : -1;
    if(idx>=0){
      draft.piantine[idx]=Object.assign({id:_pe.editingPlanId}, planFields);
    } else {
      draft.piantine.push(Object.assign({id:_pe.editingPlanId||uid()}, planFields));
    }
    navBack();
    toast('Planimetria salvata');
  }, 200);
}

async function peLoadBg(evt){
  const file=evt.target.files&&evt.target.files[0];
  evt.target.value='';
  if(!file) return;
  pePushHistory();

  function _applyBgImage(img){
    // Re-encode at the resolution the image is actually displayed/composited at (900px
    // wide) instead of keeping the original — which for a PDF render or a phone photo can
    // be several times larger than needed and was, before this fix, the single biggest
    // unnecessary contributor to localStorage usage for a declaration with floor plans.
    const aspect=img.width/img.height;
    const newW=900, newH=Math.max(Math.round(900/aspect),400);
    const bgCanvas=document.createElement('canvas');
    bgCanvas.width=newW; bgCanvas.height=newH;
    bgCanvas.getContext('2d').drawImage(img,0,0,newW,newH);
    const resizedDataUrl=bgCanvas.toDataURL('image/jpeg', 0.82);
    const resizedImg=new Image();
    resizedImg.onload=()=>{
      _pe.bgImage=resizedImg;
      _pe.bgDataUrl=resizedDataUrl;
      const c=_pe.canvas, fc=_pe.freehandCanvas;
      c.width=newW; c.height=newH;
      if(fc){ fc.width=newW; fc.height=newH; }
      peComposite();
      toast('Planimetria caricata');
    };
    resizedImg.src=resizedDataUrl;
  }

  if(file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf')){
    toast('Caricamento PDF…');
    try{
      const pdfjsLib=window['pdfjs-dist/build/pdf'];
      if(!pdfjsLib){ toast('PDF.js non disponibile — connessione internet necessaria'); return; }
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const ab=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:ab}).promise;
      const page=await pdf.getPage(1);
      const viewport=page.getViewport({scale:2.0});
      // Render to a temp canvas, then convert to Image
      const tmp=document.createElement('canvas');
      tmp.width=Math.round(viewport.width); tmp.height=Math.round(viewport.height);
      await page.render({canvasContext:tmp.getContext('2d'),viewport}).promise;
      const img=new Image();
      img.onload=()=>_applyBgImage(img);
      img.src=tmp.toDataURL('image/png');
    }catch(e){ toast('Errore PDF: '+(e.message||e)); }
  } else {
    const reader=new FileReader();
    reader.onload=function(){
      const img=new Image();
      img.onload=()=>_applyBgImage(img);
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  }
}

// ---- Canvas init (called after each re-render) ----
function initPiantinaCanvas(){
  const canvas=document.getElementById('piantinaCanvas');
  if(!canvas) return;
  _pe.canvas=canvas;
  _pe.ctx=canvas.getContext('2d');

  if(_pe._pendingCanvasW || _pe._pendingBgDataUrl || _pe._pendingFreehandDataUrl){
    // Entering the editor for a specific floor plan (new or saved) — size the canvas to
    // match it right away, then load its background/ink layers asynchronously.
    const w=_pe._pendingCanvasW||900, h=_pe._pendingCanvasH||600;
    canvas.width=w; canvas.height=h;
    _pe.freehandCanvas=document.createElement('canvas');
    _pe.freehandCanvas.width=w; _pe.freehandCanvas.height=h;

    const bgUrl=_pe._pendingBgDataUrl, fhUrl=_pe._pendingFreehandDataUrl;
    _pe._pendingCanvasW=null; _pe._pendingCanvasH=null;
    _pe._pendingBgDataUrl=null; _pe._pendingFreehandDataUrl=null;

    if(bgUrl){
      const img=new Image();
      img.onload=()=>{ _pe.bgImage=img; _pe.bgDataUrl=bgUrl; peComposite(); };
      img.src=bgUrl;
    }
    if(fhUrl){
      const fimg=new Image();
      fimg.onload=()=>{ if(_pe.freehandCanvas) _pe.freehandCanvas.getContext('2d').drawImage(fimg,0,0); peComposite(); };
      fimg.src=fhUrl;
    }
  } else if(!_pe.freehandCanvas){
    // Ensure freehand canvas matches size
    _pe.freehandCanvas=document.createElement('canvas');
    _pe.freehandCanvas.width=canvas.width;
    _pe.freehandCanvas.height=canvas.height;
  } else if(_pe._savedFD){
    // Restore freehand pixels saved before re-render
    _pe.freehandCanvas.width=_pe._savedFD.width;
    _pe.freehandCanvas.height=_pe._savedFD.height;
    canvas.width=_pe._savedFD.width;
    canvas.height=_pe._savedFD.height;
    _pe.freehandCanvas.getContext('2d').putImageData(_pe._savedFD,0,0);
    _pe._savedFD=null;
  } else {
    // Continuing the same editing session (e.g. navigated to another screen and back) —
    // the off-screen freehand canvas already has the right pixels; just make sure the
    // freshly-recreated visible <canvas> element matches its dimensions exactly.
    canvas.width=_pe.freehandCanvas.width;
    canvas.height=_pe.freehandCanvas.height;
  }

  if(_pe._savedComps){
    _pe.components=_pe._savedComps;
    _pe._savedComps=null;
  }

  peComposite();
  _peBindCanvasEvents();
  peUpdateTouchAction();
  const panBadge=document.getElementById('pe-pan-badge');
  if(panBadge) panBadge.style.display = peIsInteractiveMode() ? 'none' : 'inline-flex';
}

function _peBindCanvasEvents(){
  const canvas = _pe.canvas;
  const freehandCtx = () => _pe.freehandCanvas && _pe.freehandCanvas.getContext('2d');

  // Convert screen/touch coordinates → canvas pixel coordinates (works with CSS zoom)
  function peGetPos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return [(src.clientX - rect.left) * scaleX, (src.clientY - rect.top) * scaleY];
  }

  // ─── Pinch-to-zoom on the outer scroll container ───
  const outer = document.getElementById('pe-outer');
  let _pinch0 = null, _zoom0 = 1;

  function pinchDist(e){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }

  if(outer){
    outer.addEventListener('touchstart', function(e){
      if(e.touches.length === 2){ _pinch0 = pinchDist(e); _zoom0 = _pe.zoom; e.preventDefault(); }
    },{passive:false});
    outer.addEventListener('touchmove', function(e){
      if(e.touches.length === 2 && _pinch0){
        const newZoom = Math.max(0.5, Math.min(5, _zoom0 * pinchDist(e) / _pinch0));
        if(Math.abs(newZoom - _pe.zoom) > 0.01){ _pe.zoom = newZoom; peApplyZoom(); }
        e.preventDefault();
      }
    },{passive:false});
    outer.addEventListener('touchend', function(e){ if(e.touches.length < 2) _pinch0 = null; });
  }

  // ─── Canvas draw / component interaction ───
  function start(e){
    if(e.touches && e.touches.length >= 2) return; // pinch handled by outer container listeners

    const [x,y] = peGetPos(e);

    // 1. MOVE MODE — cooldown prevents the "Sposta" button tap triggering immediately
    if(_pe.movingIdx !== null){
      e.preventDefault();
      if(Date.now() >= (_pe.moveReadyAt || 0)) peFinishMove(x, y);
      return;
    }

    // 2. HIT-TEST existing components FIRST (fixes duplicate-icon bug when in placement mode)
    const hitIdx = peHitTest(x, y);
    if(hitIdx >= 0){
      e.preventDefault();
      const cp = _pe.components[hitIdx];
      // Don't decide yet whether this is a tap (→ open menu) or a drag (→ move it live);
      // that's resolved once we see whether the pointer actually travels, in move()/stop().
      _pe.dragCompIdx = hitIdx;
      _pe.dragMoved = false;
      _pe.dragStartX = x; _pe.dragStartY = y;
      _pe.dragOffsetX = x - cp.x; _pe.dragOffsetY = y - cp.y;
      return;
    }

    // 2.5 HIT-TEST existing lines — grabbing near an endpoint lets it be dragged on its own
    //     (shortened/extended/repositioned to meet another line precisely); grabbing the
    //     middle moves the whole line. Checked regardless of which tool is active, same as
    //     components, so a previously-drawn line can always be fine-tuned afterwards.
    const lineHit = peHitTestLine(x, y);
    if(lineHit){
      e.preventDefault();
      const ln = _pe.lines[lineHit.idx];
      _pe.lineDragIdx = lineHit.idx;
      _pe.lineDragPart = lineHit.part;
      _pe.lineDragMoved = false;
      _pe.lineDragStartX = x; _pe.lineDragStartY = y;
      _pe.lineDragOrigX1=ln.x1; _pe.lineDragOrigY1=ln.y1; _pe.lineDragOrigX2=ln.x2; _pe.lineDragOrigY2=ln.y2;
      if(_pe.ctxMenuIdx !== null){ _pe.ctxMenuIdx=null; const old=document.getElementById('pe-ctx-menu'); if(old) old.remove(); }
      return;
    }

    // 3. Close context menu / deselect a line if the tap missed everything interactive
    if(_pe.ctxMenuIdx !== null){
      e.preventDefault();
      _pe.ctxMenuIdx = null;
      const old=document.getElementById('pe-ctx-menu'); if(old) old.remove();
      peComposite();
      return;
    }
    if(_pe.selectedLineIdx !== null){
      e.preventDefault();
      _pe.selectedLineIdx = null;
      peComposite();
      return;
    }

    // 4. PLACEMENT MODE — only if no existing component was hit
    if(_pe.activeComp){ e.preventDefault(); peAddComponent(x, y); return; }

    // 5. NEUTRAL / PAN MODE — no drawing tool selected: let the touch pass through
    //    so the outer container scrolls natively instead of drawing a stroke.
    if(!_pe.tool){ return; }

    // 6. FREEHAND DRAWING — a tool is actively selected
    e.preventDefault();
    _pe.drawing = true;
    [_pe.startX,_pe.startY] = [x,y]; [_pe.lastX,_pe.lastY] = [x,y];
    pePushHistory();
    if(_pe.tool === 'testo'){
      _pe.drawing = false;
      const txt = prompt('Testo da inserire:');
      if(txt){
        const fc=freehandCtx(); if(!fc) return;
        fc.font=`bold ${_pe.thickness*5+10}px sans-serif`; fc.fillStyle=_pe.color;
        fc.textAlign='left'; fc.textBaseline='top'; fc.fillText(txt,x,y); peComposite();
      } else { _pe.history.pop(); }
      return;
    }
    if(_pe.tool !== 'matita' && _pe.tool !== 'gomma'){
      _pe.snapshot = _pe.ctx.getImageData(0,0,canvas.width,canvas.height);
    }
  }

  function move(e){
    // ─── Dragging a line's endpoint (resize/reposition) or whole body (translate) ───
    if(_pe.lineDragIdx !== null){
      e.preventDefault();
      const [x,y] = peGetPos(e);
      const ln = _pe.lines[_pe.lineDragIdx];
      if(!ln){ _pe.lineDragIdx=null; return; }
      if(!_pe.lineDragMoved){
        if(Math.hypot(x-_pe.lineDragStartX, y-_pe.lineDragStartY) < 6) return;
        _pe.lineDragMoved = true;
        pePushHistory();
      }
      if(_pe.lineDragPart === 'body'){
        const dx = x - _pe.lineDragStartX, dy = y - _pe.lineDragStartY;
        ln.x1 = _pe.lineDragOrigX1 + dx; ln.y1 = _pe.lineDragOrigY1 + dy;
        ln.x2 = _pe.lineDragOrigX2 + dx; ln.y2 = _pe.lineDragOrigY2 + dy;
      } else {
        // Dragging one endpoint — snap it onto a nearby endpoint of ANOTHER line so the two
        // corners line up exactly, which is the whole point of being able to grab it.
        const snapped = peFindSnapPoint(x, y, _pe.lineDragIdx, _pe.lineDragPart);
        if(_pe.lineDragPart === 'p1'){ ln.x1 = snapped.x; ln.y1 = snapped.y; }
        else { ln.x2 = snapped.x; ln.y2 = snapped.y; }
      }
      peComposite();
      return;
    }

    // ─── Dragging an existing component to reposition it live ───
    if(_pe.dragCompIdx !== null){
      e.preventDefault();
      const [x,y] = peGetPos(e);
      const cp = _pe.components[_pe.dragCompIdx];
      if(!cp){ _pe.dragCompIdx=null; return; }
      if(!_pe.dragMoved){
        // Require a small movement threshold before committing to "drag" — keeps a plain
        // tap (finger barely shifts) from nudging the icon instead of opening its menu.
        if(Math.hypot(x-_pe.dragStartX, y-_pe.dragStartY) < 6) return;
        _pe.dragMoved = true;
        pePushHistory(); // one undo step covers the whole drag gesture
        _pe.ctxMenuIdx = null;
        const old=document.getElementById('pe-ctx-menu'); if(old) old.remove();
      }
      cp.x = x - _pe.dragOffsetX;
      cp.y = y - _pe.dragOffsetY;
      peComposite();
      return;
    }

    if(!_pe.drawing) return;
    e.preventDefault();
    const [x,y] = peGetPos(e);
    const fc = freehandCtx(); if(!fc) return;
    fc.strokeStyle=_pe.color; fc.lineWidth=_pe.tool==='gomma'?_pe.thickness*4:_pe.thickness;
    fc.lineCap='round'; fc.lineJoin='round';
    if(_pe.tool==='matita'){
      fc.beginPath(); fc.moveTo(_pe.lastX,_pe.lastY); fc.lineTo(x,y); fc.stroke();
      [_pe.lastX,_pe.lastY]=[x,y]; peComposite();
    } else if(_pe.tool==='gomma'){
      fc.clearRect(x-_pe.thickness*2,y-_pe.thickness*2,_pe.thickness*4,_pe.thickness*4); peComposite();
    } else if(_pe.snapshot){
      const ctx=_pe.ctx; ctx.putImageData(_pe.snapshot,0,0);
      ctx.strokeStyle=_pe.color; ctx.lineWidth=_pe.thickness; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath();
      if(_pe.tool==='linea'){
        // Live snap preview: while drawing a brand-new line, show it jumping onto a nearby
        // existing endpoint as soon as it's close enough, exactly like editing an existing one.
        const snapped = peFindSnapPoint(x, y, null);
        ctx.moveTo(_pe.startX,_pe.startY); ctx.lineTo(snapped.x,snapped.y); ctx.stroke();
      }
      else if(_pe.tool==='rettangolo'){ ctx.strokeRect(_pe.startX,_pe.startY,x-_pe.startX,y-_pe.startY); }
      else if(_pe.tool==='cerchio'){
        const rx=(x-_pe.startX)/2, ry=(y-_pe.startY)/2;
        ctx.ellipse(_pe.startX+rx,_pe.startY+ry,Math.abs(rx),Math.abs(ry),0,0,2*Math.PI); ctx.stroke();
      }
    }
  }

  function stop(e){
    // ─── Finish dragging (or tapping/selecting) a line ───
    if(_pe.lineDragIdx !== null){
      const idx = _pe.lineDragIdx, wasMoved = _pe.lineDragMoved;
      _pe.lineDragIdx = null;
      _pe.lineDragPart = null;
      _pe.lineDragMoved = false;
      // A plain tap (no drag) toggles selection; an actual drag leaves it selected so the
      // handles stay visible for an immediate follow-up tweak.
      _pe.selectedLineIdx = wasMoved ? idx : (_pe.selectedLineIdx === idx ? null : idx);
      peComposite();
      return;
    }

    // ─── Finish dragging (or tapping) a component ───
    if(_pe.dragCompIdx !== null){
      const idx = _pe.dragCompIdx, wasMoved = _pe.dragMoved;
      _pe.dragCompIdx = null;
      _pe.dragMoved = false;
      if(!wasMoved){
        // The pointer never moved past the threshold — treat it as a simple tap that
        // opens (or closes) that component's menu, exactly like before.
        _pe.ctxMenuIdx = (_pe.ctxMenuIdx === idx) ? null : idx;
        if(_pe.ctxMenuIdx === null){ const old=document.getElementById('pe-ctx-menu'); if(old) old.remove(); }
      }
      peComposite();
      return;
    }

    if(!_pe.drawing){ _pe.snapshot=null; return; }
    _pe.drawing=false;

    if(_pe.tool==='linea' && _pe.snapshot){
      // A new line becomes an editable vector object (not permanent raster pixels) so its
      // ends can be grabbed later and snapped onto another line's corner for a precise join.
      const src = e.changedTouches ? e.changedTouches[0] : e;
      const tmpE = {touches:null, clientX:src.clientX, clientY:src.clientY};
      const [rawX,rawY] = peGetPos(tmpE);
      const end = peFindSnapPoint(rawX, rawY, null);
      const start = peFindSnapPoint(_pe.startX, _pe.startY, null);
      if(Math.hypot(end.x-start.x, end.y-start.y) >= 4){ // ignore accidental zero-length taps
        _pe.lines.push({ id: uid(), x1:start.x, y1:start.y, x2:end.x, y2:end.y, color:_pe.color, thickness:_pe.thickness });
      } else {
        _pe.history.pop(); // nothing was actually drawn — drop the reserved undo step
      }
      _pe.snapshot=null;
      peComposite();
      return;
    }

    if(_pe.snapshot && _pe.tool!=='matita' && _pe.tool!=='gomma'){
      const src = e.changedTouches ? e.changedTouches[0] : e;
      const tmpE = {touches:null, clientX:src.clientX, clientY:src.clientY};
      const [x,y] = peGetPos(tmpE);
      const fc=freehandCtx();
      if(fc){
        fc.strokeStyle=_pe.color; fc.lineWidth=_pe.thickness; fc.lineCap='round'; fc.lineJoin='round';
        fc.beginPath();
        if(_pe.tool==='rettangolo'){ fc.strokeRect(_pe.startX,_pe.startY,x-_pe.startX,y-_pe.startY); }
        else if(_pe.tool==='cerchio'){
          const rx=(x-_pe.startX)/2, ry=(y-_pe.startY)/2;
          fc.ellipse(_pe.startX+rx,_pe.startY+ry,Math.abs(rx),Math.abs(ry),0,0,2*Math.PI); fc.stroke();
        }
        peComposite();
      }
    }
    _pe.snapshot=null;
  }

  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',  e=>stop(e));
  canvas.addEventListener('mouseleave',e=>stop(e));
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend',  e=>stop(e));
  canvas.addEventListener('touchcancel', e=>stop(e));
}



/* expose functions used by inline handlers to global scope (they already are, since declared with function keyword at top level) */

render();
loadSavedBackupHandle().then(()=>{ if(backupFileHandle) render(); });
</script>
</body>
</html>
