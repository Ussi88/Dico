<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap');
  :root{
    --navy:#16324A;
    --navy-dark:#0E2236;
    --navy-tint:#EAF0F5;
    --amber:#E8A33D;
    --amber-dark:#C8842A;
    --amber-tint:#FBF1DF;
    --bg:#F2F4F7;
    --surface:#FFFFFF;
    --surface-2:#F8F9FB;
    --border:#E2E6EB;
    --border-soft:#EDF0F3;
    --text:#161E29;
    --text-dim:#5B6573;
    --text-faint:#8B95A3;
    --green:#2F9E63;
    --green-tint:#E8F6EE;
    --red:#D6483F;
    --red-tint:#FBEAE8;
    --blue:#2C7FB8;
    --purple:#6B5CA5;
    --gas:#D9692E;
    --elettrico:#D9A91E;
    --idrico:#2C7FB8;
    --condiz:#2BA7A1;
    --tv:#6B5CA5;
    --caldaia:#B0413E;
    --dati:#1A7A6E;
    --riscaldamento:#C06000;
    --radius:14px;
    --radius-sm:10px;
    --shadow-card:0 1px 2px rgba(20,30,45,.05), 0 6px 18px -10px rgba(20,30,45,.16);
    --shadow-lift:0 2px 4px rgba(20,30,45,.06), 0 14px 30px -12px rgba(20,30,45,.22);
    --font-display:'Manrope','Inter',-apple-system,system-ui,"Roboto",Segoe UI,Helvetica,Arial,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,"Roboto",Segoe UI,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:40px;}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:10;
    background:var(--navy);
    color:#fff;
    padding:16px 16px 14px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 2px 14px rgba(8,18,28,.22);
  }
  .topbar .back{
    background:rgba(255,255,255,.12);
    border:none;color:#fff;width:34px;height:34px;border-radius:10px;
    font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;
    flex:0 0 auto;
  }
  .topbar .back:active{background:rgba(255,255,255,.22);}
  .topbar h1{font-family:var(--font-display);font-size:17px;font-weight:700;margin:0;letter-spacing:.1px;flex:1;}
  .topbar .sub{font-size:11.5px;color:rgba(255,255,255,.65);margin-top:2px;}

  .content{padding:18px 16px 8px;}

  /* ---------- home ---------- */
  .brand{
    padding:28px 20px 22px;
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy-dark) 100%);
    color:#fff;border-radius:0 0 28px 28px;margin-bottom:20px;
    position:relative;overflow:hidden;
  }
  .brand::before{
    content:'';position:absolute;top:-60%;right:-30%;width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle, rgba(232,163,61,.14) 0%, transparent 70%);
    pointer-events:none;
  }
  .brand-top{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;}
  .brand .eyebrow{font-size:11.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--amber);font-weight:700;}
  .brand .stamp{
    display:inline-flex;align-items:center;gap:5px;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);
    border-radius:20px;padding:4px 10px 4px 8px;font-size:10.5px;font-weight:700;
    color:rgba(255,255,255,.85);letter-spacing:.3px;flex:0 0 auto;
  }
  .brand .stamp svg{width:12px;height:12px;color:var(--amber);}
  .brand h1{font-family:var(--font-display);font-size:23px;margin:8px 0 3px;font-weight:800;letter-spacing:-.2px;line-height:1.2;position:relative;}
  .brand p{font-size:13.5px;color:rgba(255,255,255,.68);margin:0;position:relative;}

  .section-label{
    display:flex;align-items:center;gap:7px;
    font-size:12px;text-transform:uppercase;letter-spacing:1.1px;color:var(--text-dim);font-weight:700;
    margin:24px 4px 11px;
  }
  .section-label::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--amber);flex:0 0 auto;}
  .section-label:first-of-type{margin-top:0;}

  .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:0 16px;}
  .type-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:15px 14px 14px;text-align:left;cursor:pointer;
    display:flex;flex-direction:column;gap:9px;
    box-shadow:var(--shadow-card);
    transition:transform .12s ease, box-shadow .12s ease;
    position:relative;overflow:hidden;
  }
  .type-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:var(--accent,var(--navy));
  }
  .type-card:active{transform:scale(.97);box-shadow:var(--shadow-card);}
  .type-card .ic{
    width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:20px;
  }
  .type-card .ic svg{width:21px;height:21px;}
  .type-card .ttl{font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:-.1px;line-height:1.25;}
  .type-card .desc{font-size:11px;color:var(--text-dim);line-height:1.35;}

  .util-row{padding:0 16px;display:flex;flex-direction:column;gap:9px;}
  .util-btn{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;
    font-size:14px;font-weight:600;color:var(--text);
    box-shadow:var(--shadow-card);
    transition:transform .1s ease;
  }
  .util-btn:active{transform:scale(.985);background:var(--surface-2);}
  .util-btn .ic{
    width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    background:var(--navy-tint);color:var(--navy);
  }
  .util-btn .ic svg{width:17px;height:17px;}
  .util-btn .chev{margin-left:auto;color:var(--text-faint);}
  .chev svg{width:16px;height:16px;display:block;}

  /* ---------- forms ---------- */

/* ============================================================
   STORAGE LAYER (localStorage with graceful in-memory fallback)
   ============================================================ */
const memoryStore = {};
let storageAvailable = true;
try {
  const t = '__test__';
  localStorage.setItem(t, '1');
  localStorage.removeItem(t);
} catch (e) {
  storageAvailable = false;
}

// Tracks whether the MOST RECENT storeSet() call actually reached localStorage. This is
// distinct from `storageAvailable` (which means localStorage is unusable from the start,
// e.g. inside a sandboxed preview): this flag catches the much sneakier case where storage
// IS available but a specific write fails partway through — almost always because the saved
// data (declarations/drafts with embedded floor-plan and PDF-attachment images) no longer
// fits the browser's storage quota (commonly just 4-10MB). Without this, a failed save was
// previously 100% silent: the app showed "saved" while nothing was actually persisted, so the
// data vanished the next time the app was opened.
let lastStoreWriteOk = true;
let lastStoreWriteError = null;

function storeGet(key, fallback) {
  try {
    if (storageAvailable) {
      const raw = localStorage.getItem(key);
      return raw !== null ? JSON.parse(raw) : fallback;
    }
    return memoryStore[key] !== undefined ? memoryStore[key] : fallback;
  } catch (e) { return fallback; }
}
function storeSet(key, value) {
  try {
    if (storageAvailable) {
      localStorage.setItem(key, JSON.stringify(value));
      lastStoreWriteOk = true;
      lastStoreWriteError = null;
      return true;
    } else {
      memoryStore[key] = value;
      return false; // never persisted anywhere outside this tab/session
    }
  } catch (e) {
    // Most often QuotaExceededError: the data no longer fits. Keep the app usable for the
    // current session via the in-memory fallback, but make absolutely sure the failure is
    // visible — see _warnStorageWriteFailed(), called by the higher-level save*() functions.
    memoryStore[key] = value;
    lastStoreWriteOk = false;
    lastStoreWriteError = e;
    return false;
  }
}

// Rough estimate of how much of the browser's storage quota this app is using — shown in
// the Backup section so people can see trouble coming before a save silently fails.
function estimateStorageUsageKB(){
  if(!storageAvailable) return null;
  try {
    let total = 0;
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.indexOf('dc_')===0) total += (localStorage.getItem(k)||'').length;
    }
    return Math.round(total/1024);
  } catch(e){ return null; }
}

let _storageAlertShownThisSession = false;
function _warnStorageWriteFailed(){
  const isQuota = lastStoreWriteError && (lastStoreWriteError.name === 'QuotaExceededError' || /quota/i.test(lastStoreWriteError.message||''));
  if(!_storageAlertShownThisSession){
    _storageAlertShownThisSession = true;
    alert(
      'ATTENZIONE — Salvataggio non riuscito\n\n' +
      (isQuota
        ? 'Lo spazio di salvataggio del browser è esaurito (spesso succede con molte planimetrie o allegati PDF). '
        : 'Si è verificato un errore di salvataggio. ') +
      'I dati di QUESTA sessione non sono stati salvati in modo permanente: se chiudi l\'app ora, andranno persi.\n\n' +
      'Cosa fare subito:\n' +
      '1) Esporta un backup da Impostazioni → Backup (o scarica/stampa il documento appena generato).\n' +
      '2) Elimina dallo Storico o dalle Bozze le dichiarazioni con molte planimetrie/allegati per liberare spazio.\n' +
      '3) Riprova a salvare.'
    );
  }
}

/* ============================================================
   BACKUP / RIPRISTINO — esporta e importa tutti i dati dell'app
   ============================================================ */
const BACKUP_VERSION = 1;

const BACKUP_FOLDER = 'App Dichiarazioni di Conformità';
let autoBackupEnabled = storeGet('dc_autoBackupEnabled', true);

// File System Access API is only available in secure contexts served over
// http(s) — browsers disable it entirely for pages opened as a local file
// (file://), which is how this app is normally used. We feature-detect and
// degrade gracefully to a normal download when it isn't available.
const FS_ACCESS_SUPPORTED = (typeof window.showSaveFilePicker === 'function') && window.isSecureContext && !window.AndroidDownloadBridge;
let backupFileHandle = null; // FileSystemFileHandle, only ever set when FS_ACCESS_SUPPORTED

function idbOpen(){
  return new Promise((resolve, reject)=>{
    try {
      const req = indexedDB.open('dc_app_db', 1);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error);
    } catch(e){ reject(e); }
  });
}
async function idbGet(key){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject)=>{
      const tx = db.transaction('handles','readonly');
      const req = tx.objectStore('handles').get(key);
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error);
    });
  } catch(e){ return null; }
}
async function idbSet(key, value){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject)=>{
      const tx = db.transaction('handles','readwrite');
      tx.objectStore('handles').put(value, key);
      tx.oncomplete = ()=>resolve(true);
      tx.onerror = ()=>reject(tx.error);
    });
  } catch(e){ return false; }
}

async function loadSavedBackupHandle(){
  if(!FS_ACCESS_SUPPORTED) return;
  const handle = await idbGet('backupFileHandle');
  if(handle) backupFileHandle = handle;
}

async function onChooseBackupLocation(){
  if(!FS_ACCESS_SUPPORTED){
    toast('Il tuo browser non permette di scegliere la cartella in questo contesto');
    return;
  }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: 'Backup_Certificazioni_Impianti.json',
      types: [{description:'Backup JSON', accept: {'application/json':['.json']}}]
    });
    backupFileHandle = handle;
    await idbSet('backupFileHandle', handle);
    await writeBackupToHandle(handle);
    toast('File di backup impostato: ' + handle.name);
    render();
  } catch(e){
    if(e && e.name !== 'AbortError') toast('Scelta annullata o non riuscita');
  }
}

async function writeBackupToHandle(handle){
  const json = JSON.stringify(buildBackupPayload(), null, 2);
  const perm = await handle.queryPermission({mode:'readwrite'});
  if(perm !== 'granted'){
    const req = await handle.requestPermission({mode:'readwrite'});
    if(req !== 'granted') throw new Error('permission denied');
  }
  const writable = await handle.createWritable();
  await writable.write(json);
  await writable.close();
}

function buildBackupPayload(){
  return {
    app: 'Dichiarazioni di Conformità',
    backupVersion: BACKUP_VERSION,
    exportedAt: new Date().toISOString(),
    company: company,
    clients: clients,
    declarations: declarations,
    drafts: drafts
  };
}

// ── Native Android wrapper integration ──────────────────────────────────────────────
// When this page runs inside the bundled Android WebView app, two JS interfaces may be
// injected by the native side: AndroidDownloadBridge (writes files straight to the device's
// Downloads folder, since blob: URL <a download> clicks aren't reliably caught by a WebView)
// and AndroidPrintBridge (hands a document to Android's native print dialog, since plain
// window.open()+window.print() isn't supported the same way inside a WebView as in a real
// browser tab). Both are optional: if absent (e.g. running in a normal mobile/desktop
// browser, exactly as this app has always worked), everything falls back to the original
// browser-only approach below, completely unchanged.
function _nativeSaveBlob(blob, filename){
  if(!window.AndroidDownloadBridge || typeof window.AndroidDownloadBridge.saveFile !== 'function') return false;
  try{
    const reader = new FileReader();
    reader.onload = function(){
      try{ window.AndroidDownloadBridge.saveFile(reader.result, filename, blob.type||'application/octet-stream'); }
      catch(e){ /* native side already shows its own error toast */ }
    };
    reader.readAsDataURL(blob);
    return true;
  }catch(e){ return false; }
}
function _nativePrint(html){
  if(!window.AndroidPrintBridge || typeof window.AndroidPrintBridge.printHtml !== 'function') return false;
  try{ window.AndroidPrintBridge.printHtml(html); return true; }
  catch(e){ return false; }
}

function downloadBackupFile(filenameSuffix){
  const json = JSON.stringify(buildBackupPayload(), null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const filename = `Backup_Certificazioni_Impianti${filenameSuffix}.json`;
  if(_nativeSaveBlob(blob, filename)) return;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${BACKUP_FOLDER}/${filename}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

function onExportBackup(){
  if(backupFileHandle){
    writeBackupToHandle(backupFileHandle)
      .then(()=>toast('Backup aggiornato: ' + backupFileHandle.name))
      .catch(()=>{ downloadBackupFile('_' + todayISO()); toast(`Backup salvato in Download/${BACKUP_FOLDER}`); });
    return;
  }
  downloadBackupFile('_' + todayISO());
  toast(`Backup salvato in Download/${BACKUP_FOLDER}`);
}

function autoBackupIfEnabled(){
  if(!autoBackupEnabled) return;
  if(backupFileHandle){
    writeBackupToHandle(backupFileHandle).catch(()=>{ try{ downloadBackupFile(''); }catch(e){} });
    return;
  }
  try {
    downloadBackupFile('');
  } catch(e){ /* fail silently: auto-backup is a best-effort convenience */ }
}

function onToggleAutoBackup(){
  autoBackupEnabled = !autoBackupEnabled;
  storeSet('dc_autoBackupEnabled', autoBackupEnabled);
  render();
}

/* ============================================================
   SINGLE-ITEM EXPORT / ARCHIVE / IMPORT
   Lets a single declaration or draft be saved out to its own small file and removed from
   this device to free up storage space, then brought back in later (e.g. to edit it again)
   without needing to restore the whole backup and overwrite everything else.
   ============================================================ */
function _sanitizeFilenamePart(s){
  return (s||'').toString().replace(/[^a-zA-Z0-9 _-]+/g,'').trim().replace(/\s+/g,'_') || 'senza_nome';
}

function exportSingleItem(item, kind){
  // kind: 'declaration' | 'draft'
  const payload = {
    app: 'Dichiarazioni di Conformità',
    exportType: 'single_' + kind,
    backupVersion: BACKUP_VERSION,
    exportedAt: new Date().toISOString()
  };
  payload[kind] = item;
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const label = kind==='declaration' ? (item.numero || item.id) : (TYPES[item.type] ? TYPES[item.type].label : item.type);
  const filename = `${kind==='declaration'?'Dichiarazione':'Bozza'}_${_sanitizeFilenamePart(label)}.json`;
  if(_nativeSaveBlob(blob, filename)) return;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${BACKUP_FOLDER}/${filename}`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

function onArchiveDeclaration(id){
  const d = declarations.find(x=>x.id===id);
  if(!d) return;
  if(!confirm(`Esportare "${d.numero}" su file e rimuoverla da questo dispositivo per liberare spazio?\n\nResterà salvata nel file scaricato: potrai reimportarla in qualsiasi momento da Storico → Importa dichiarazione, ad esempio per modificarla di nuovo.`)) return;
  exportSingleItem(d, 'declaration');
  declarations = declarations.filter(x=>x.id!==id);
  const ok = saveDeclarations();
  if(ok) toast('Dichiarazione esportata e rimossa dal dispositivo');
  render();
}

function onArchiveDraft(id){
  const d = drafts.find(x=>x.id===id);
  if(!d) return;
  if(!confirm('Esportare questa bozza su file e rimuoverla da questo dispositivo per liberare spazio?\n\nResterà salvata nel file scaricato: potrai reimportarla in qualsiasi momento da Bozze → Importa bozza.')) return;
  exportSingleItem(d, 'draft');
  drafts = drafts.filter(x=>x.id!==id);
  const ok = saveDrafts();
  if(ok) toast('Bozza esportata e rimossa dal dispositivo');
  render();
}

function onImportSingleItem(evt, kind){
  // kind: 'declaration' | 'draft'
  const file = evt.target.files && evt.target.files[0];
  evt.target.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    try{
      const data = JSON.parse(reader.result);
      const item = data[kind] || data; // tolerate a raw item JSON too, not just the wrapped export
      if(!item || !item.id || !item.type){
        toast('File non valido: non sembra una ' + (kind==='declaration'?'dichiarazione':'bozza') + ' esportata da questa app');
        return;
      }
      const arr = kind==='declaration' ? declarations : drafts;
      const existingIdx = arr.findIndex(x=>x.id===item.id);
      const prevItem = existingIdx>=0 ? arr[existingIdx] : null;
      if(existingIdx>=0){
        if(!confirm('Esiste già un elemento con questo identificativo su questo dispositivo. Sovrascriverlo con la versione importata?')) return;
        arr[existingIdx] = item;
      } else {
        arr.push(item);
      }
      const ok = kind==='declaration' ? saveDeclarations() : saveDrafts();
      if(!ok){
        // Storage write failed (e.g. quota still exceeded) — roll back so memory matches
        // what's actually persisted, instead of showing data that will vanish on reload.
        if(existingIdx>=0) arr[existingIdx]=prevItem; else arr.pop();
        return;
      }
      toast((kind==='declaration'?'Dichiarazione':'Bozza') + ' importata: ' + (item.numero || TYPES[item.type]?.label || item.id));
      render();
    }catch(e){
      toast('Impossibile leggere il file: formato non valido');
    }
  };
  reader.readAsText(file);
}

function onImportBackup(evt){
  const file = evt.target.files && evt.target.files[0];
  evt.target.value = ''; // reset so the same file can be re-selected later
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    let data;
    try {
      data = JSON.parse(reader.result);
    } catch(e){
      toast('File non valido: non è un backup leggibile');
      return;
    }
    if(!data || typeof data !== 'object' || !('company' in data) || !('clients' in data)){
      toast('File non valido: non sembra un backup di questa app');
      return;
    }
    const summary = `Azienda: ${data.company && data.company.ragioneSociale ? data.company.ragioneSociale : '(vuota)'}\n`
      + `Clienti: ${(data.clients||[]).length}  ·  Dichiarazioni: ${(data.declarations||[]).length}  ·  Bozze: ${(data.drafts||[]).length}`;
    const ok = confirm(`Importare questo backup?\n\n${summary}\n\nI dati attualmente presenti su questo dispositivo verranno sostituiti.`);
    if(!ok) return;
    company = data.company || company;
    clients = Array.isArray(data.clients) ? data.clients : clients;
    declarations = Array.isArray(data.declarations) ? data.declarations : declarations;
    drafts = Array.isArray(data.drafts) ? data.drafts : drafts;
    saveCompany(); saveClients(); saveDeclarations(); saveDrafts();
    toast('Backup importato correttamente');
    navHome();
  };
  reader.onerror = function(){ toast('Non sono riuscito a leggere il file'); };
  reader.readAsText(file);
}


function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function fmtDate(iso){
  if(!iso) return '____________________';
  const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`;
}
function esc(s){ return (s||'').toString().replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]?w[0].toUpperCase():'').join('') || '?';
}

function getCaldaiaPosaItems(tipo){
  if(tipo==='scaldabagno'){
    return CALDAIA_POSA_ITEMS
      .filter(([k])=>k!=='collegamentoIdraulico' && k!=='cronotermostato')
      .map(([k,l])=>k==='collegamentoSanitaria' ? [k,'Collegamento ingresso/uscita acqua sanitaria'] : [k,l]);
  }
  return CALDAIA_POSA_ITEMS;
}

/* ============================================================
   ROUTER / STATE
   ============================================================ */
let route = {view:'home'};
let draft = null; // working declaration draft while filling a form
let history = [];

function nav(view, params){
  history.push(route);
  route = Object.assign({view:view}, params||{});
  render();
  window.scrollTo(0,0);
}
function navBack(){
  route = history.pop() || {view:'home'};
  render();
  window.scrollTo(0,0);
}
function navHome(){
  history = [];
  route = {view:'home'};
  render();
  window.scrollTo(0,0);
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ============================================================
   RENDER: SHELL
   ============================================================ */
function render(){
  const app = document.getElementById('app');
  let html = '';
  let topbar = '';
  switch(route.view){
    case 'home': html = viewHome(); break;
    case 'azienda': topbar=tb('Dati Azienda','Anagrafica dell\'impresa'); html = viewAzienda(); break;
    case 'clienti': topbar=tb('Anagrafica Clienti','Rubrica committenti'); html = viewClienti(); break;
    case 'clienteForm': topbar=tb(route.id?'Modifica Cliente':'Nuovo Cliente'); html = viewClienteForm(); break;
    case 'declForm': topbar=tb(TYPES[route.type].label, 'Compilazione dichiarazione'); html = viewDeclForm(); break;
    case 'preview': topbar=tb('Anteprima Dichiarazione'); html = viewPreview(); break;
    case 'storico': topbar=tb('Storico Dichiarazioni'); html = viewStorico(); break;
    case 'bozze': topbar=tb('Bozze', 'Certificazioni in lavorazione'); html = viewBozze(); break;
    case 'responsabili': topbar=tb('Responsabili Tecnici','Anagrafica'); html = viewResponsabili(); break;
    case 'responsabileForm': topbar=tb(route.id?'Modifica Responsabile':'Nuovo Responsabile'); html = viewResponsabileForm(); break;
    case 'firmaModal': topbar=tb('Aggiungi firma'); html = viewFirmaModal(); break;
    case 'piantinaEditor': topbar=tb('Annota planimetria'); html = viewPiantinaEditor(); break;
    default: html = viewHome();
  }
  // Save layer state BEFORE destroying the DOM (so toolbar clicks never lose drawings)
  if(route.view==='piantinaEditor' && _pe.canvas){
    if(_pe.freehandCanvas){
      try{
        const fc=_pe.freehandCanvas;
        _pe._savedFD = fc.getContext('2d').getImageData(0,0,fc.width,fc.height);
      }catch(e){ _pe._savedFD=null; }
    }
    _pe._savedComps = JSON.parse(JSON.stringify(_pe.components));
  }
  app.innerHTML = topbar + '<div class="content">' + html + '</div>';
  bindEvents();
  if(route.view==='firmaModal') requestAnimationFrame(initCanvas);
  if(route.view==='piantinaEditor') requestAnimationFrame(initPiantinaCanvas);
}

function tb(title, sub){
  return `<div class="topbar">
    <button class="back" onclick="navBack()">‹</button>
    <div><h1>${esc(title)}</h1>${sub?'<div class="sub">'+esc(sub)+'</div>':''}</div>
  </div>`;
}

        <li>Copia il link <b>https://xxxx.netlify.app</b> che ricevi</li>
        <li>Aprilo in Chrome sul telefono</li>
        <li>Menu (⋮) → <b>Aggiungi a schermata Home</b></li>
      </ol>
      <div style="font-size:12px;color:var(--text-dim)">ℹ️ Netlify è gratuito — con un account gratuito il link rimane attivo per sempre.</div>
      ` : `

        Puoi installare l'app come icona sul telefono, con schermo intero senza barra del browser:
      </p>
      <p style="font-size:13px;color:var(--text-dim);margin:0">
        Tocca <b>⋮ Menu</b> in Chrome → <b>Aggiungi a schermata Home</b> → Conferma.
        L'app aprirà a schermo pieno con la sua icona.
      </p>
      `}
    </div>
    <div style="height:10px"></div>

  const cards = Object.values(TYPES).map(t => `
    <div class="type-card" style="--accent:${t.color}" onclick="startDeclaration('${t.key}')">
      <div class="ic" style="background:${t.color}1A;color:${t.color}">${t.icon}</div>

    ${(() => {
      const usageKB = estimateStorageUsageKB();
      if(usageKB===null) return '';
      const isHigh = usageKB > 3000; // most browsers cap localStorage around 4-10MB
      return `<div class="hint" style="padding:0 16px 10px;margin-top:-6px${isHigh?';color:#E63C3C;font-weight:600':''}">Spazio occupato dai dati salvati: ~${usageKB} KB${isHigh?' — vicino al limite del browser: esporta un backup e valuta di eliminare dichiarazioni/bozze con molte planimetrie o allegati PDF.':''}</div>`;

    <div class="util-row">

      <div class="hint" style="padding:8px 4px 0">Per scegliere tu stesso la cartella di destinazione serve aprire questa pagina da un indirizzo web (http/https) in un browser; non è possibile né da file locale né dentro l'app Android. I backup automatici vanno comunque nella cartella Download del dispositivo.</div>
      `}

    id:null, committente:'', proprietarioDiverso:false, proprietario:'',
    codiceFiscale:'', via:'', numero:'', scala:'', piano:'', interno:'',
    comune:'', provincia:''
  };
  route._editing = c;
  return `
    <div class="card">
      <h3>Committente</h3>

      <div class="field"><label>Codice fiscale</label><input id="f_codiceFiscale" type="text" style="text-transform:uppercase" value="${esc(c.codiceFiscale)}"></div>
      <label class="check-opt ${c.proprietarioDiverso?'sel':''}" onclick="setTimeout(syncProprietarioBox,0)">
        <input type="checkbox" id="f_proprietarioDiverso" ${c.proprietarioDiverso?'checked':''}>
        <span>Il proprietario è diverso dal committente</span>
      </label>
      <div id="proprietarioBox" style="${c.proprietarioDiverso?'':'display:none'};margin-top:12px">
        <div class="field"><label>Nome e cognome proprietario</label><input id="f_proprietario" type="text" value="${esc(c.proprietario)}"></div>
      </div>
    </div>

    <div class="card">
      <h3>Indirizzo immobile</h3>
      <div class="row2">
        <div class="field"><label>Via</label><input id="f_via" type="text" value="${esc(c.via)}"></div>
        <div class="field"><label>N°</label><input id="f_numero" type="text" value="${esc(c.numero)}"></div>
      </div>
      <div class="row3">
        <div class="field"><label>Scala</label><input id="f_scala" type="text" value="${esc(c.scala)}"></div>
        <div class="field"><label>Piano</label><input id="f_piano" type="text" value="${esc(c.piano)}"></div>
        <div class="field"><label>Interno</label><input id="f_interno" type="text" value="${esc(c.interno)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Comune</label><input id="f_comune" type="text" value="${esc(c.comune)}"></div>
        <div class="field"><label>Provincia</label><input id="f_provincia" type="text" maxlength="2" style="text-transform:uppercase" value="${esc(c.provincia)}"></div>
      </div>
    </div>

    <div class="btn-row">
      ${c.id ? `<button class="btn btn-danger" onclick="onDeleteCliente('${c.id}')">Elimina</button>` : ''}
      <button class="btn btn-primary" onclick="onSaveCliente()">Salva cliente</button>
    </div>
  `;
}

function syncProprietarioBox(){
  const cb = document.getElementById('f_proprietarioDiverso');
  if(!cb) return;
  const box = document.getElementById('proprietarioBox');
  if(box) box.style.display = cb.checked ? '' : 'none';
  const lbl = cb.closest('.check-opt');
  if(lbl) lbl.classList.toggle('sel', cb.checked);
}

function onSaveCliente(){
  const c = route._editing;
  const data = {
    id: c.id || uid(),
    committente: document.getElementById('f_committente').value.trim(),
    codiceFiscale: document.getElementById('f_codiceFiscale').value.trim().toUpperCase(),
    proprietarioDiverso: document.getElementById('f_proprietarioDiverso').checked,
    proprietario: document.getElementById('f_proprietarioDiverso').checked ? document.getElementById('f_proprietario').value.trim() : '',
    via: document.getElementById('f_via').value.trim(),
    numero: document.getElementById('f_numero').value.trim(),
    scala: document.getElementById('f_scala').value.trim(),
    piano: document.getElementById('f_piano').value.trim(),
    interno: document.getElementById('f_interno').value.trim(),
    comune: document.getElementById('f_comune').value.trim(),
    provincia: document.getElementById('f_provincia').value.trim().toUpperCase()
  };
  if(!data.committente){ toast('Inserisci almeno il nome del committente'); return; }
  const idx = clients.findIndex(x=>x.id===data.id);
  if(idx>=0) clients[idx]=data; else clients.push(data);
  saveClients();
  toast('Cliente salvato');
  autoBackupIfEnabled();
  navBack();
}

function onDeleteCliente(id){
  if(!confirm('Eliminare questo cliente dall\'anagrafica?')) return;
  clients = clients.filter(x=>x.id!==id);
  saveClients();
  toast('Cliente eliminato');
  autoBackupIfEnabled();
  navBack();
}

/* ============================================================
   DECLARATION FLOW
   ============================================================ */
function startDeclaration(typeKey){
  const t = TYPES[typeKey];
  if(t.custom==='caldaia'){ startCaldaiaDeclaration(typeKey); return; }
  if(t.custom==='riscaldamento'){ startRiscaldamentoDeclaration(typeKey); return; }
  const seq = declarations.filter(d=>d.type===typeKey).length + 1;
  draft = {
    id: uid(),
    type: typeKey,
    numero: `${t.prefix}-${new Date().getFullYear()}-${String(seq).padStart(3,'0')}`,
    data: todayISO(),
    tipoIntervento: 'nuovo',
    altroDescrizione:'',
    descrizione: t.descrizione,
    clientId: clients.length===1 ? clients[0].id : '',
    usoEdificio: 'civile',
    progettoRedattoDa: responsabili.length>0 ? responsabili[0].nome : (company.titolare || ''),
    normaTecnica: t.norma,
    responsabileId: responsabili.length>0 ? responsabili[0].id : '',
    responsabileTecnico: responsabili.length>0 ? responsabili[0].nome : (company.titolare || ''),
    allegati: {progetto:false, relazioneMateriali:true, schemaImpianto:true, dichiarazioniPrecedenti:false, certificatoCamerale:true, attestazioneMateriali:false},
    extra: {},
    tables: {},
    checks: {},
    toggles: {},
    includeLibretto: LIBRETTO[typeKey] ? 'builtin' : 'none',
    librettoFileDataUrl:'', librettoFileMime:'', librettoFilePages: null,
    allegatiFile: [],
    piantine: [],
    firmaRTDataUrl:'', firmaRTMime:'',
    firmaClienteDataUrl:'', firmaClienteMime:''
  };
  t.extra.forEach(f=>{ draft.extra[f.key] = ''; });
  (TABLE_SCHEMAS[typeKey]||[]).forEach(ts=>{
    draft.tables[ts.key] = ts.defaultRows
      ? ts.defaultRows.map(r=>Object.assign({}, r))
      : [emptyTableRow(ts)];
  });
  (CHECK_SCHEMAS[typeKey]||[]).forEach(cs=>{
    draft.checks[cs.key] = cs.items.map(()=>({esito:'positivo', valore:''}));
  });
  (TOGGLE_SCHEMAS[typeKey]||[]).forEach(tg=>{
    draft.toggles[tg.key] = {};
    tg.items.forEach(([k])=>{ draft.toggles[tg.key][k] = false; });
  });
  nav('declForm', {type:typeKey});
}

function emptyTableRow(ts){
  const row = {};
  ts.columns.forEach(([k])=>{ row[k]=''; });
  return row;
}

function startCaldaiaDeclaration(typeKey){
  const t = TYPES[typeKey];
  const seq = declarations.filter(d=>d.type===typeKey).length + 1;
  draft = {
    id: uid(),
    type: typeKey,
    numero: `${t.prefix}-${new Date().getFullYear()}-${String(seq).padStart(3,'0')}`,
    data: todayISO(),
    clientId: clients.length===1 ? clients[0].id : '',
    tipoApparecchio: 'caldaia',
    responsabileId: responsabili.length>0 ? responsabili[0].id : '',
    caldaia: {marca:'', modello:'', matricola:'', annoFabbricazione:'', tipoGas:'', categoria:'', potenzaTermica:'', classeNOx:'', marcaturaCE:''},
    installazione: {ubicazione:'', scaricoFumi:'', diametroScarico:'', lunghezzaCondotto:'', alimentazioneGas:'', aerazioneLocale:'', scaricoCondensa:'', neutralizzatoreCondensa:''},
    posaChecklist: {},
    collaudo: {},
    esitoCollaudo: 'positivo',
    includeCollaudo: true,
    docConsegnata: {},
    includeLibretto: 'builtin',
    librettoFileDataUrl:'', librettoFileMime:'', librettoFilePages: null,
    allegatiFile: [],
    piantine: [],
    firmaRTDataUrl:'', firmaRTMime:'',
    firmaClienteDataUrl:'', firmaClienteMime:''
  };
  CALDAIA_POSA_ITEMS.forEach(([k])=>{ draft.posaChecklist[k] = false; });
  CALDAIA_COLLAUDO_ITEMS.forEach(([k])=>{ draft.collaudo[k] = ''; });
  CALDAIA_DOC_ITEMS.forEach(([k])=>{ draft.docConsegnata[k] = false; });

}

function renderAllegatiFileList(){
  const files = draft.allegatiFile || [];
  if(files.length===0) return '';
  return files.map((f,i)=>{
    const isImg = f.mime && f.mime.startsWith('image/');
    const icon = isImg ? ICONS.image : ICONS.document;
    const sizeKb = Math.round(f.size/1024);
    const pagesNote = f.pages ? `${f.pages.length} pagin${f.pages.length===1?'a':'e'} · ` : '';
    return `
      <div class="client-item" style="margin-bottom:8px;cursor:default">
        <div class="av" style="background:#EEF1F4;color:var(--navy);font-size:16px">${icon}</div>
        <div style="flex:1">
          <div class="nm" style="font-size:13.5px">${esc(f.label)}</div>
          <div class="ad">${esc(f.filename)} · ${pagesNote}${sizeKb} KB</div>
        </div>
        <button class="tbl-del" onclick="onRemoveAllegatoFile(${i})">×</button>
      </div>`;
  }).join('');
}

/* ---- dynamic component tables ---- */
function renderTableSection(ts){
  const rows = draft.tables[ts.key] || [];
  const head = ts.columns.map(([k,l])=>`<th>${esc(l)}</th>`).join('') + '<th style="width:30px"></th>';
  const body = rows.map((row, ri)=>{
    const cells = ts.columns.map(([k])=>`<td><input type="text" id="tc_${ts.key}_${ri}_${k}" value="${esc(row[k])}"></td>`).join('');
    const delBtn = rows.length>1 ? `<td><button class="tbl-del" onclick="removeTableRow('${ts.key}',${ri})">×</button></td>` : '<td></td>';
    return `<tr>${cells}${delBtn}</tr>`;
  }).join('');
  return `
    <div class="card">
      <h3>${esc(ts.title)}</h3>
      <div class="tbl-scroll">
        <table class="dyn-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>
      </div>
      <button class="btn btn-ghost" style="margin-top:10px" onclick="addTableRow('${ts.key}')">+ Aggiungi riga</button>
    </div>
  `;
}

function addTableRow(tableKey){
  syncDraftFromDOM();
  const ts = (TABLE_SCHEMAS[draft.type]||[]).find(t=>t.key===tableKey);
  draft.tables[tableKey].push(emptyTableRow(ts));
  render();
}
function removeTableRow(tableKey, idx){
  syncDraftFromDOM();
  draft.tables[tableKey].splice(idx,1);
  render();
}

/* ---- fixed checklists with esito ---- */
function renderChecklistSection(cs){
  const state = draft.checks[cs.key] || [];
  const rows = cs.items.map((label, i)=>{
    const v = state[i] || {esito:'positivo', valore:''};
    const valoreCell = cs.hasValore ? `<input type="text" id="ck_${cs.key}_${i}_valore" placeholder="valore" value="${esc(v.valore)}" style="margin-top:6px">` : '';
    return `
      <div class="check-opt" style="align-items:flex-start;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;gap:10px;width:100%">
          <span style="flex:1;font-size:13px">${esc(label)}</span>
          <select id="ck_${cs.key}_${i}_esito" style="width:auto;padding:6px 8px;font-size:12.5px" onchange="onCheckEsitoChange('${cs.key}',${i},this.value)">
            <option value="positivo" ${v.esito==='positivo'?'selected':''}>Positivo</option>
            <option value="negativo" ${v.esito==='negativo'?'selected':''}>Negativo</option>
            <option value="na" ${v.esito==='na'?'selected':''}>N/A</option>
          </select>
        </div>
        ${valoreCell}
      </div>`;
  }).join('');
  return `<div class="card"><h3>${esc(cs.title)}</h3><div class="check-group">${rows}</div></div>`;
}

function onCheckEsitoChange(key, idx, val){
  syncDraftFromDOM();
  draft.checks[key][idx].esito = val;
  render();
}

function renderToggleGroup(tg){
  const state = draft.toggles[tg.key] || {};
  const rows = tg.items.map(([k,label])=>`
    <label class="check-opt ${state[k]?'sel':''}">
      <input type="checkbox" id="tg_${tg.key}_${k}" ${state[k]?'checked':''} onchange="onToggleChange('${tg.key}','${k}')">
      <span>${esc(label)}</span>
    </label>`).join('');
  return `<div class="card"><h3>${esc(tg.title)}</h3><div class="check-group">${rows}</div></div>`;
}

function onToggleChange(groupKey, itemKey){
  syncDraftFromDOM();
  draft.toggles[groupKey][itemKey] = !draft.toggles[groupKey][itemKey];
  render();
}

function onInterventoChange(v){ syncDraftFromDOM(); draft.tipoIntervento=v; render(); }
function onUsoChange(v){ syncDraftFromDOM(); draft.usoEdificio=v; render(); }
function onAllegatoChange(k){ syncDraftFromDOM(); draft.allegati[k] = !draft.allegati[k]; render(); }

function onResponsabileChange(id){
  syncDraftFromDOM();
  draft.responsabileId = id;
  const r = responsabili.find(x=>x.id===id);
  if(r){
    draft.responsabileTecnico = r.nome;
    draft.progettoRedattoDa = r.nome;
  }
  render();
}
function onLibrettoModeChange(mode){
  syncDraftFromDOM();
  draft.includeLibretto = mode;
  render();
}

async function onLibrettoFileUploaded(evt){
  const file = evt.target.files && evt.target.files[0];
  evt.target.value = '';
  if(!file) return;
  if(file.size > 8*1024*1024){ toast('File troppo grande (max 8 MB)'); return; }

  const isPDF = file.type==='application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  if(isPDF){
    toast('Elaborazione PDF…');
    try{
      const pdfjsLib = window['pdfjs-dist/build/pdf'];
      if(!pdfjsLib){ toast('PDF.js non disponibile — connessione internet necessaria per allegare un PDF'); return; }
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const ab=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:ab}).promise;
      const pages=[];
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const viewport=page.getViewport({scale:1.4});
        const tmp=document.createElement('canvas');
        tmp.width=Math.round(viewport.width); tmp.height=Math.round(viewport.height);
        await page.render({canvasContext:tmp.getContext('2d'), viewport}).promise;
        pages.push(tmp.toDataURL('image/jpeg', 0.78));
      }
      draft.librettoFilePages = pages;
      draft.librettoFileDataUrl = file.name; // kept only as a filename label, not for rendering
      draft.librettoFileMime = file.type || 'application/pdf';
      draft.includeLibretto = 'file';
      render();
      toast(`Libretto allegato: ${file.name} (${pages.length} pagin${pages.length===1?'a':'e'})`);
    }catch(e){
      toast('Errore nella lettura del PDF: ' + (e.message||e));
    }
    return;
  }

  draft.librettoFilePages = null;
  const reader = new FileReader();
  reader.onload = function(){
    draft.librettoFileDataUrl = reader.result;
    draft.librettoFileMime = file.type;
    draft.includeLibretto = 'file';
    render();
    toast('Libretto allegato: ' + file.name);
  };
  reader.readAsDataURL(file);

async function onAddAllegatoFile(){
  syncDraftFromDOM();
  const tipoEl = document.getElementById('af_tipo');
  const fileEl = document.getElementById('af_file');
  const file = fileEl.files && fileEl.files[0];
  if(!file){ toast('Scegli un file da allegare'); return; }
  if(file.size > MAX_ALLEGATO_BYTES){
    toast('File troppo grande (max 4MB): comprimilo o riducine la risoluzione');
    return;
  }

  const isPDF = file.type==='application/pdf' || file.name.toLowerCase().endsWith('.pdf');

  if(isPDF){
    // PDFs are rasterized into page images right away. A PDF shown via <iframe> in the
    // generated document looks fine on screen, but browsers generally drop nested PDF
    // viewers when printing/exporting — the attachment would come out blank. Real <img>
    // pages always print and export correctly, in print preview, "Stampa/PDF" and Word.
    toast('Elaborazione PDF…');
    try{
      const pdfjsLib = window['pdfjs-dist/build/pdf'];
      if(!pdfjsLib){ toast('PDF.js non disponibile — connessione internet necessaria per allegare un PDF'); return; }
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const ab=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:ab}).promise;
      const pages=[];
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const viewport=page.getViewport({scale:1.4});
        const tmp=document.createElement('canvas');
        tmp.width=Math.round(viewport.width); tmp.height=Math.round(viewport.height);
        await page.render({canvasContext:tmp.getContext('2d'), viewport}).promise;
        pages.push(tmp.toDataURL('image/jpeg', 0.78));
      }
      draft.allegatiFile = draft.allegatiFile || [];
      draft.allegatiFile.push({
        label: tipoEl.value,
        filename: file.name,
        mime: file.type || 'application/pdf',
        size: file.size,
        pages
      });
      render();
      toast(`Allegato aggiunto (${pages.length} pagin${pages.length===1?'a':'e'})`);
    }catch(e){
      toast('Errore nella lettura del PDF: ' + (e.message||e));
    }
    return;
  }

  const reader = new FileReader();
  reader.onload = function(){
    draft.allegatiFile = draft.allegatiFile || [];
    draft.allegatiFile.push({
      label: tipoEl.value,
      filename: file.name,
      mime: file.type,
      size: file.size,
      dataUrl: reader.result
    });
    render();
    toast('Allegato aggiunto');
  };
  reader.onerror = function(){ toast('Non sono riuscito a leggere il file'); };
  reader.readAsDataURL(file);
}

function onRemoveAllegatoFile(idx){

function syncDraftFromDOM(){
  if(TYPES[draft.type].custom==='caldaia'){ syncCaldaiaFromDOM(); return; }
  if(TYPES[draft.type].custom==='riscaldamento'){ syncRiscaldamentoFromDOM(); return; }
  const elNumero = document.getElementById('f_numero');
  if(!elNumero) return; // not currently on the declaration form
  draft.numero = elNumero.value.trim();
  draft.data = document.getElementById('f_data').value || todayISO();
  draft.clientId = document.getElementById('f_clientId').value;
  if(draft.tipoIntervento==='altro'){
    const el = document.getElementById('f_altroDescrizione');
    if(el) draft.altroDescrizione = el.value.trim();
  }
  draft.descrizione = document.getElementById('f_descrizione').value.trim();
  draft.progettoRedattoDa = document.getElementById('f_progettoRedattoDa').value.trim();
  draft.normaTecnica = document.getElementById('f_normaTecnica').value.trim();
  const elRT = document.getElementById('f_responsabileId');
  if(elRT) draft.responsabileId = elRT.value;
  // keep responsabileTecnico in sync for backward compat
  const rt = responsabili.find(x=>x.id===draft.responsabileId);
  if(rt) draft.responsabileTecnico = rt.nome;

  const t = TYPES[draft.type];
  t.extra.forEach(f=>{
    const el = document.getElementById('x_'+f.key);
    if(el) draft.extra[f.key] = el.value;
  });

  (TABLE_SCHEMAS[draft.type]||[]).forEach(ts=>{
    const rows = draft.tables[ts.key] || [];
    rows.forEach((row, ri)=>{
      ts.columns.forEach(([k])=>{
        const el = document.getElementById(`tc_${ts.key}_${ri}_${k}`);
        if(el) row[k] = el.value;
      });
    });
  });

  (CHECK_SCHEMAS[draft.type]||[]).forEach(cs=>{
    const state = draft.checks[cs.key] || [];
    state.forEach((item, i)=>{
      const esitoEl = document.getElementById(`ck_${cs.key}_${i}_esito`);
      if(esitoEl) item.esito = esitoEl.value;
      if(cs.hasValore){
        const valEl = document.getElementById(`ck_${cs.key}_${i}_valore`);
        if(valEl) item.valore = valEl.value;
      }
    });
  });
}

function onGenerateDeclaration(){
  syncDraftFromDOM();
  if(!draft.clientId){ toast('Seleziona un cliente per continuare'); return; }
  const newDecl = JSON.parse(JSON.stringify(Object.assign({}, draft, {createdAt: new Date().toISOString()})));
  declarations.push(newDecl);
  const ok = saveDeclarations();
  if(!ok){
    // Roll back the in-memory push so state stays consistent — a declaration that only
    // "exists" in this tab's memory isn't really generated. _warnStorageWriteFailed()
    // already alerted the user; keep them on the form so nothing is lost from view.
    declarations.pop();
    return;
  }
  const draftIdx = drafts.findIndex(x=>x.id===draft.id);
  if(draftIdx>=0){ drafts.splice(draftIdx,1); saveDrafts(); }
  autoBackupIfEnabled();
  nav('preview', {declId: draft.id});
}

function renderLibrettoBlock(b){
  let out = '';
  if(b.h){
    out += (b.level===2)
      ? `<p style="margin:14px 0 4px"><b>${esc(b.h)}</b></p>`
      : `<h4>${esc(b.h)}</h4>`;
  }
  if(b.p) out += b.p.map(t=>`<p>${esc(t)}</p>`).join('');
  if(b.ul) out += `<ul>${b.ul.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>`;
  if(b.table){
    const head = `<tr>${b.table.head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>`;
    const rows = b.table.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('');
    out += `<table class="doc-table"><thead>${head}</thead><tbody>${rows}</tbody></table>`;
  }
  return out;
}

function buildAllegatiFileHTML(d){
  const files = d.allegatiFile || [];
  if(files.length===0) return '';
  const items = files.map(f=>{
    const isImg = f.mime && f.mime.startsWith('image/');
    if(f.pages && f.pages.length){
      // PDF rasterized into page images at upload time — these print and export reliably,
      // unlike a live PDF viewer embedded in an <iframe>.
      const pageImgs = f.pages.map((p,i)=>
        `<img src="${p}" style="max-width:100%;border:1px solid #ccc;display:block${i>0?';margin-top:6px':''}">`
      ).join('');
      return `<div style="margin:0 0 22px;text-align:center">
        <div style="font-size:11.5px;font-weight:700;color:#16324A;margin-bottom:6px">${esc(f.label)} — ${esc(f.filename)}${f.pages.length>1?` (${f.pages.length} pagine)`:''}</div>
        ${pageImgs}
      </div>`;
    }
    if(isImg){
      return `<div style="margin:0 0 22px;text-align:center">
        <div style="font-size:11.5px;font-weight:700;color:#16324A;margin-bottom:6px">${esc(f.label)} — ${esc(f.filename)}</div>
        <img src="${f.dataUrl}" style="max-width:100%;max-height:480px;border:1px solid #ccc">
      </div>`;
    }
    // Legacy fallback: a PDF attached before this fix, stored as a raw data URL with no
    // rasterized pages. Best-effort iframe — may not appear when printed/exported.
    return `<div style="margin:0 0 16px;padding:10px 12px;border:1px solid #ccc;border-radius:6px;background:#FAFAFA">
      <div style="font-size:11.5px;font-weight:700;color:#16324A">${esc(f.label)}</div>
      <div style="font-size:11px;color:#666">${esc(f.filename)} (${Math.round(f.size/1024)} KB) — documento PDF allegato</div>
      <iframe src="${f.dataUrl}" style="width:100%;height:700px;border:1px solid #ccc;margin-top:8px"></iframe>
    </div>`;
  }).join('');
  return `
    <div class="page-break"></div>
    <h2>ALLEGATI ALLA DICHIARAZIONE</h2>
    <div class="docsub">Documentazione integrativa</div>
    ${items}
  `;
}

  else if(d.includeLibretto==='file' && d.librettoFilePages && d.librettoFilePages.length){
    // PDF rasterized into page images at upload time — prints/exports reliably.
    const pageImgs = d.librettoFilePages.map((p,i)=>
      `<img src="${p}" style="max-width:100%;border:1px solid #ccc;display:block${i>0?';margin-top:6px':''}">`
    ).join('');
    libHTML = `<div class="page-break"></div><h2>LIBRETTO D'USO E MANUTENZIONE</h2>${pageImgs}`;
  }
  else if(d.includeLibretto==='file' && d.librettoFileDataUrl){
    const isPDF = d.librettoFileMime && d.librettoFileMime.includes('pdf');
    libHTML = `<div class="page-break"></div><h2>LIBRETTO D'USO E MANUTENZIONE</h2>
      ${isPDF
        ? `<iframe src="${d.librettoFileDataUrl}" style="width:100%;height:900px;border:1px solid #ccc;margin-top:8px"></iframe>`
        : `<div style="text-align:center"><img src="${d.librettoFileDataUrl}" style="max-width:100%;height:auto"></div>`
      }`;
  }
  return mainHTML + libHTML + buildPiantineHTML(d) + buildAllegatiFileHTML(d);
}

    pdrPunto:'', portataTermicaCollegata:'0.00', altroScenarioB:'',
    toggles:{},
    allegati:{progetto:true, relazioneMateriali:true, schemaImpianto:false, dichiarazioniPrecedenti:false, certificatoCamerale:true, attestazioneMateriali:false},
    includeLibretto: 'builtin',
    librettoFileDataUrl:'', librettoFileMime:'', librettoFilePages: null,
    allegatiFile: [],
    piantine: [],
    firmaRTDataUrl:'', firmaRTMime:'',
    firmaClienteDataUrl:'', firmaClienteMime:''
  };
  (TOGGLE_SCHEMAS.riscaldamento||[]).forEach(tg=>{
    draft.toggles[tg.key]={};

}

function syncRiscaldamentoFromDOM(){
  const el = document.getElementById('f_numero'); if(!el) return;
  draft.numero = el.value.trim();
  draft.data = document.getElementById('f_data').value || todayISO();
  draft.clientId = document.getElementById('f_clientId').value;
  draft.pdrPunto = (document.getElementById('f_pdrPunto')||{}).value || '';
  draft.sezione = (document.getElementById('f_sezione')||{}).value || '';
  draft.particella = (document.getElementById('f_particella')||{}).value || '';
  draft.foglio = (document.getElementById('f_foglio')||{}).value || '';
  draft.subalterno = (document.getElementById('f_subalterno')||{}).value || '';
  draft.portataTermicaCollegata = (document.getElementById('f_portataTermicaCollegata')||{}).value || '';
  draft.altroScenarioB = (document.getElementById('f_altroScenarioB')||{}).value || '';
  draft.progettoRedattoDa = (document.getElementById('f_progettoRedattoDa')||{}).value?.trim() || '';
  draft.normaTecnica = (document.getElementById('f_normaTecnica')||{}).value?.trim() || '';
  if(draft.tipoIntervento==='altro'){
    const ae = document.getElementById('f_altroDescrizione'); if(ae) draft.altroDescrizione=ae.value.trim();
  }
  draft.descrizione = (document.getElementById('f_descrizione')||{}).value?.trim() || '';
  const rtEl = document.getElementById('f_responsabileId'); if(rtEl) draft.responsabileId = rtEl.value;
  const rt = responsabili.find(x=>x.id===draft.responsabileId); if(rt) draft.responsabileTecnico=rt.nome;
  const libEl = document.getElementById('f_includeLibretto'); if(libEl) draft.includeLibretto = libEl.checked;
  // NEW: also read libretto radio group
  const libRadio = document.querySelector('input[name="librettoMode"]:checked');
  if(libRadio) draft.includeLibretto = libRadio.value;
  // sync allegati checkboxes
  ALLEGATI_LABELS.forEach(([k])=>{ const e=document.getElementById('al_'+k); if(e) draft.allegati[k]=e.checked; });
  // sync toggles
  (TOGGLE_SCHEMAS.riscaldamento||[]).forEach(tg=>{
    tg.items.forEach(([k])=>{ const e=document.getElementById(`tg_${tg.key}_${k}`); if(e) draft.toggles[tg.key][k]=e.checked; });
  });
}

function wrapForExport(innerHTML, title){
  return `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>${esc(title)}</title>
  <style>
    body{font-family:Calibri,Arial,sans-serif;font-size:12.5pt;color:#1a222c;line-height:1.5;max-width:760px;margin:30px auto;}
    h2{font-size:15pt;text-align:center;color:#16324A;margin-bottom:2px;}
    .docsub{text-align:center;font-size:9.5pt;color:#666;margin-bottom:18px;}
    h4{font-size:11.5pt;color:#16324A;margin:18px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px;}
    .kv{margin-bottom:4px;} .kv b{margin-right:6px;}
    ul{margin:4px 0 10px 20px;padding:0;} li{margin-bottom:3px;}
    p{margin:0 0 8px;}
    table.doc-table{width:100%;border-collapse:collapse;margin:8px 0 14px;font-size:10pt;}
    table.doc-table th{background:#EEF3F7;color:#16324A;text-align:left;padding:5px 7px;border:1px solid #ccc;font-size:9pt;}
    table.doc-table td{padding:5px 7px;border:1px solid #ccc;}
    .page-break{break-before:page;page-break-before:always;}
  </style></head><body>${innerHTML}</body></html>`;
}

function printDecl(id){
  const d = getDecl(id);
  const html = wrapForExport(buildFullDocHTML(d), 'Dichiarazione ' + d.numero);
  if(_nativePrint(html)) return;
  const w = window.open('', '_blank');
  if(!w){ toast('Consenti le finestre pop-up per stampare'); return; }
  w.document.open(); w.document.write(html); w.document.close();
  setTimeout(()=>{ w.focus(); w.print(); }, 350);
}

function downloadDecl(id){
  const d = getDecl(id);
  const html = wrapForExport(buildFullDocHTML(d), 'Dichiarazione ' + d.numero);
  const blob = new Blob(['\ufeff', html], {type:'application/msword'});
  const t = TYPES[d.type];
  const c = clients.find(x=>x.id===d.clientId);
  const safeName = (c ? c.committente : 'cliente').replace(/[^a-z0-9]+/gi,'_');
  const filename = `Dichiarazione_${t.label.replace(/\s+/g,'_')}_${safeName}.doc`;
  if(_nativeSaveBlob(blob, filename)){ toast('Documento scaricato'); return; }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  toast('Documento scaricato');
}

function onEditDeclaration(id){

function onDeleteDeclaration(id){

function onSaveDraft(){
  syncDraftFromDOM();
  const idx = drafts.findIndex(x=>x.id===draft.id);
  const snapshot = JSON.parse(JSON.stringify(draft));
  snapshot.savedAt = new Date().toISOString();
  if(idx>=0) drafts[idx] = snapshot; else drafts.push(snapshot);
  const ok = saveDrafts();
  if(!ok){
    // _warnStorageWriteFailed() already showed the detailed alert. Stay on the form —
    // don't claim success, and don't navigate away from work that isn't actually saved.
    return;
  }
  toast('Bozza salvata');
  autoBackupIfEnabled();
  navHome();
}

function resumeDraft(id){
  const found = drafts.find(x=>x.id===id);
  if(!found) return;
  draft = JSON.parse(JSON.stringify(found));
  nav('declForm', {type: draft.type});
}

function onDeleteDraft(id){
  if(!confirm('Eliminare questa bozza?')) return;
  drafts = drafts.filter(x=>x.id!==id);
  saveDrafts();
  toast('Bozza eliminata');
  autoBackupIfEnabled();
  render();
}

function viewFirmaModal(){

      <canvas id="firmaCanvas" width="320" height="140"
        style="width:100%;border:2px solid var(--border);border-radius:10px;background:#fff;touch-action:none;display:block">
      </canvas>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="clearCanvas()">${ICONS.trash} Cancella e rifai</button>
    </div>
    <div class="btn-row" style="margin-top:6px">
      <button class="btn btn-ghost" onclick="navBack()">Annulla</button>
      <button class="btn btn-amber" onclick="onConfirmCanvas()">Usa questa firma</button>
    </div>
  `;

function clearCanvas(){
  const canvas = document.getElementById('firmaCanvas');
  if(!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

function initCanvas(){
  const canvas = document.getElementById('firmaCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a222c'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  let drawing = false, lastX = 0, lastY = 0;
  function getPos(e){ const rect=canvas.getBoundingClientRect(); const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height; const src=e.touches?e.touches[0]:e; return [(src.clientX-rect.left)*scaleX,(src.clientY-rect.top)*scaleY]; }
  function start(e){ e.preventDefault(); drawing=true; [lastX,lastY]=getPos(e); }
  function draw(e){ if(!drawing) return; e.preventDefault(); const [x,y]=getPos(e); ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke(); [lastX,lastY]=[x,y]; }
  function stop(){ drawing=false; }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',draw); canvas.addEventListener('mouseup',stop);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',draw,{passive:false}); canvas.addEventListener('touchend',stop);
}

function onConfirmCanvas(){
  const canvas = document.getElementById('firmaCanvas');
  if(!canvas){ navBack(); return; }
  const ctx = canvas.getContext('2d');
  const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const hasContent = Array.from(data).some((v,i)=>i%4===3 && v>0);
  if(!hasContent){ toast('Disegna prima la firma'); return; }
  const dataUrl = canvas.toDataURL('image/png');
  const target = route.returnRoute;
  if(target==='responsabileForm'){
    const rId = route.returnId;
    const r = responsabili.find(x=>x.id===rId) || (route._editingR);
    if(r){ r.firmaDataUrl=dataUrl; r.firmaMime='image/png'; }
    else if(route._editingR){ route._editingR.firmaDataUrl=dataUrl; route._editingR.firmaMime='image/png'; }
    navBack(); toast('Firma salvata');
  } else if(target==='cliente'){
    draft.firmaClienteDataUrl = dataUrl; draft.firmaClienteMime = 'image/png';
    navBack(); toast('Firma cliente allegata');
  } else {
    draft.firmaRTDataUrl = dataUrl; draft.firmaRTMime = 'image/png';
    navBack(); toast('Firma allegata alla dichiarazione');
  }
}

function onFirmaFileUploaded(evt, target){
  const file = evt.target.files && evt.target.files[0];
  evt.target.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    const dataUrl = reader.result;
    if(target==='responsabile' && route._editingR){ route._editingR.firmaDataUrl=dataUrl; route._editingR.firmaMime=file.type; render(); toast('Firma caricata'); }
    else if(target==='decl'){ draft.firmaRTDataUrl=dataUrl; draft.firmaRTMime=file.type; render(); toast('Firma allegata'); }
    else if(target==='cliente'){ draft.firmaClienteDataUrl=dataUrl; draft.firmaClienteMime=file.type; render(); toast('Firma cliente allegata'); }
  };
  reader.readAsDataURL(file);
}

function peApplyZoom(){
  const canvas=_pe.canvas;
  if(!canvas) return;

  if(!outer) return;
  const base=outer.clientWidth||390;
  const aspect=(canvas.height||600)/(canvas.width||900);
  canvas.style.width =Math.round(base*_pe.zoom)+'px';
  canvas.style.height=Math.round(base*_pe.zoom*aspect)+'px';
}
function peZoomIn()  { _pe.zoom=Math.min(5,parseFloat((_pe.zoom*1.4).toFixed(2))); peApplyZoom(); }

// ---- Composite redraw ----
// Canvas-only redraw (no menu DOM touched) – used while dragging the rotation slider,
// so the slider element itself isn't destroyed/recreated mid-gesture.
// ---- Editable lines: hit-testing, snapping, rendering ----
function peDistToSegment(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1;
  const lenSq=dx*dx+dy*dy;
  let t = lenSq>0 ? ((px-x1)*dx+(py-y1)*dy)/lenSq : 0;
  t = Math.max(0, Math.min(1, t));
  const cx=x1+t*dx, cy=y1+t*dy;
  return Math.hypot(px-cx, py-cy);
}
function peHitTestLine(x,y){
  const ENDPOINT_R=16, BODY_R=10;
  for(let i=_pe.lines.length-1;i>=0;i--){
    const ln=_pe.lines[i];
    if(Math.hypot(x-ln.x1,y-ln.y1)<=ENDPOINT_R) return {idx:i, part:'p1'};
    if(Math.hypot(x-ln.x2,y-ln.y2)<=ENDPOINT_R) return {idx:i, part:'p2'};
    if(peDistToSegment(x,y,ln.x1,ln.y1,ln.x2,ln.y2)<=BODY_R) return {idx:i, part:'body'};
  }
  return null;
}
// Finds the nearest OTHER line's endpoint within snapping range, so two segments can be
// joined into a precise corner instead of leaving a visible gap or overlap.
const LINE_SNAP_DIST=14;
function peFindSnapPoint(x,y,excludeLineIdx,excludeEnd){
  let best=null, bestDist=LINE_SNAP_DIST;
  _pe.lines.forEach((ln,idx)=>{
    [['p1',ln.x1,ln.y1],['p2',ln.x2,ln.y2]].forEach(([end,ex,ey])=>{
      if(idx===excludeLineIdx && end===excludeEnd) return;
      const d=Math.hypot(x-ex,y-ey);
      if(d<bestDist){ bestDist=d; best={x:ex,y:ey}; }
    });
  });
  return best || {x,y};
}
function peDeleteLine(idx){
  pePushHistory();
  _pe.lines.splice(idx,1);
  _pe.selectedLineIdx=null;
  peComposite();
}
function _peRenderLineDeleteBtn(){

}

function peCompositeCanvas(){
  const c=_pe.canvas, ctx=_pe.ctx;
  if(!c||!ctx) return;
  ctx.clearRect(0,0,c.width,c.height);
  // 1. Background
  if(_pe.bgImage) ctx.drawImage(_pe.bgImage,0,0,c.width,c.height);
  // 2. Freehand layer
  if(_pe.freehandCanvas) ctx.drawImage(_pe.freehandCanvas,0,0);
  // 2.5 Editable lines — kept as vector objects (not baked into the freehand layer) so their
  // endpoints stay grabbable for precise repositioning/snapping after they're drawn.
  _pe.lines.forEach((ln,i)=>{
    ctx.save();
    ctx.strokeStyle=ln.color; ctx.lineWidth=ln.thickness; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(ln.x1,ln.y1); ctx.lineTo(ln.x2,ln.y2); ctx.stroke();
    ctx.restore();
    if(i===_pe.selectedLineIdx){
      ctx.save();
      ctx.fillStyle='#2563EB';
      [[ln.x1,ln.y1],[ln.x2,ln.y2]].forEach(([hx,hy])=>{
        ctx.beginPath(); ctx.arc(hx,hy,7,0,2*Math.PI); ctx.fill();
        ctx.lineWidth=2; ctx.strokeStyle='#fff'; ctx.stroke();
      });
      ctx.restore();
    }
  });
  // 3. Components (drawn on top – always selectable)
  _pe.components.forEach((cp,i)=>{
    _peDrawCompOnCtx(ctx, cp, i===_pe.ctxMenuIdx);
  });
}
function peComposite(){
  peCompositeCanvas();
  // 4. Context menu / line-delete overlay (DOM, not canvas)
  _peRenderContextMenu();
  _peRenderLineDeleteBtn();
}

// Draw a single component object onto a given ctx
function _peDrawCompOnCtx(ctx, cp, selected){
  const svgStr = PE_COMP_SVG[cp.compId];
  if(!svgStr) return;
  // Draw async but return immediately – use cached image if available
  if(!_pe._compImgCache) _pe._compImgCache={};
  if(_pe._compImgCache[cp.compId]){
    const img=_pe._compImgCache[cp.compId];
    const rotRad=(cp.rot||0)*Math.PI/180;
    ctx.save();
    ctx.translate(cp.x, cp.y);
    ctx.rotate(rotRad);
    if(selected){ ctx.shadowColor='#2563EB'; ctx.shadowBlur=10; }
    ctx.drawImage(img, -cp.size/2, -cp.size/2, cp.size, cp.size);
    ctx.restore();
    // Label (kept upright regardless of icon rotation, like a CAD callout)
    if(cp.label){
      ctx.save();
      ctx.font='bold 12px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='top';
      const tw=ctx.measureText(cp.label).width;
      ctx.fillStyle='rgba(255,255,255,0.88)';
      ctx.fillRect(cp.x-tw/2-4, cp.y+cp.size/2+2, tw+8, 16);
      ctx.fillStyle='#1a222c';
      ctx.fillText(cp.label, cp.x, cp.y+cp.size/2+3);
      ctx.restore();
    }
  } else {
    // Load and cache
    const blob=new Blob([svgStr],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{
      _pe._compImgCache[cp.compId]=img;
      URL.revokeObjectURL(url);
      peComposite();
    };
    img.onerror=()=>URL.revokeObjectURL(url);
    img.src=url;
  }
}

// ---- Hit testing ----
function peHitTest(x, y){
  for(let i=_pe.components.length-1;i>=0;i--){
    const cp=_pe.components[i];
    const half=cp.size/2+8; // slightly enlarged hit area
    if(Math.abs(x-cp.x)<=half && Math.abs(y-cp.y)<=half) return i;
  }
  return -1;
}

// ---- Component operations ----
function peDeleteComp(idx){
  pePushHistory();
  _pe.components.splice(idx,1);
  _pe.ctxMenuIdx=null;
  const old=document.getElementById('pe-ctx-menu'); if(old) old.remove();
  peComposite();
}

function peStartMove(idx){
  _pe.movingIdx = idx;
  _pe.activeComp = null;       // exit placement mode
  _pe.ctxMenuIdx = null;
  _pe.moveReadyAt = Date.now() + 450; // ignore canvas taps for 450ms after button click
  const old = document.getElementById('pe-ctx-menu'); if(old) old.remove();
  // Update toolbar to deselect any active component tile
  document.querySelectorAll('.pe-comp-tile').forEach(el=>{
    el.style.borderColor='var(--border)'; el.style.background='#fff';
  });
  const hint=document.getElementById('pe-hint');
  if(hint){
    hint.style.color='var(--navy)';
    hint.innerHTML='<span style="display:inline-flex;width:14px;height:14px;vertical-align:-2px;margin-right:4px">'+ICONS.pin+'</span>Tocca il punto sulla planimetria dove vuoi spostare il componente.';
  }
  peUpdateTouchAction();
  peComposite();
}

function peFinishMove(x,y){
  if(_pe.movingIdx===null) return;
  pePushHistory();
  _pe.components[_pe.movingIdx].x=x;
  _pe.components[_pe.movingIdx].y=y;
  _pe.movingIdx=null;
  const hint=document.getElementById('pe-hint');
  if(hint){ hint.style.color=''; hint.innerHTML='<span style="display:inline-flex;width:14px;height:14px;vertical-align:-2px;margin-right:4px">'+ICONS.info+'</span>Seleziona un componente o usa gli strumenti di disegno libero. Tocca un\'icona già posizionata per spostarla o eliminarla.'; }
  peUpdateTouchAction();
  peComposite();
}

// ---- Rotate / resize a placed component ----
function peRotate(idx, delta){
  const cp=_pe.components[idx]; if(!cp) return;
  pePushHistory();
  cp.rot = ((cp.rot||0) + delta + 360) % 360;
  peComposite();
}
// Precise drag-to-rotate (range slider in the context menu)
function peBeginRotateDrag(idx){
  if(_pe._rotDragging) return; // pointerdown + touchstart can both fire; push history only once per gesture
  _pe._rotDragging = true;
  pePushHistory();
}
function peSetRotation(idx, val){
  const cp=_pe.components[idx]; if(!cp) return;
  cp.rot = ((parseFloat(val)||0) % 360 + 360) % 360;
  const deg=document.getElementById('pe-ctx-deg');
  if(deg) deg.textContent = Math.round(cp.rot)+'°';
  // Canvas-only redraw: keeps the slider element alive while the user is still dragging it
  peCompositeCanvas();
}
document.addEventListener('pointerup', ()=>{ _pe._rotDragging=false; });
document.addEventListener('touchend', ()=>{ _pe._rotDragging=false; });
function peResize(idx, delta){
  const cp=_pe.components[idx]; if(!cp) return;
  pePushHistory();
  cp.size = Math.max(28, Math.min(140, Math.round((cp.size||56)+delta)));
  peComposite();
}

async function peAddComponent(x,y){
  const compId=_pe.activeComp;
  if(!compId) return;
  pePushHistory();
  let comp=null;
  for(const k in PE_COMPONENTS){ const f=PE_COMPONENTS[k].find(c=>c.id===compId); if(f){ comp=f; break; } }
  const defaultLabel=comp?comp.nome:'';
  const label=(prompt(`Etichetta per "${defaultLabel}" (lascia vuoto per nome default):`)??defaultLabel)||defaultLabel;
  _pe.components.push({compId, x, y, label, size:56, rot:0});
  peComposite();
}

// ---- History ----
function pePushHistory(){
  if(!_pe.freehandCanvas) return;
  const fc=_pe.freehandCanvas;
  const fctx=fc.getContext('2d');
  _pe.history.push({
    fd: fctx.getImageData(0,0,fc.width,fc.height),
    cs: JSON.parse(JSON.stringify(_pe.components)),
    ls: JSON.parse(JSON.stringify(_pe.lines))
  });
  if(_pe.history.length>20) _pe.history.shift();
}

function peUndo(){
  if(!_pe.history.length) return;
  const h=_pe.history.pop();
  if(_pe.freehandCanvas){
    _pe.freehandCanvas.getContext('2d').putImageData(h.fd,0,0);
  }
  _pe.components=h.cs;
  _pe.lines=h.ls||[];
  _pe.selectedLineIdx=null;
  _pe.ctxMenuIdx=null;
  _pe.movingIdx=null;
  const old=document.getElementById('pe-ctx-menu'); if(old) old.remove();
  peComposite();
}

function peClear(){
  pePushHistory();
  if(_pe.freehandCanvas){
    const fc=_pe.freehandCanvas;
    fc.getContext('2d').clearRect(0,0,fc.width,fc.height);
  }
  _pe.components=[];
  _pe.lines=[];
  _pe.selectedLineIdx=null;
  _pe.ctxMenuIdx=null;
  _pe.movingIdx=null;
  const old=document.getElementById('pe-ctx-menu'); if(old) old.remove();
  peComposite();
}

/* ============================================================
   PIANTINA EDITOR — multi-floorplan management
   A declaration can have several annotated floor plans (e.g. "Piano terra",
   "Primo piano"). Each is stored as its own entry in draft.piantine with its
   own background, freehand drawing and components, so it can be reopened and
   edited again later just by tapping it.
   ============================================================ */
function _peResetSession(){
  _pe.tool='matita'; _pe.activeComp=null; _pe.color='#E63C3C'; _pe.thickness=3; _pe.zoom=1;
  _pe.drawing=false; _pe.movingIdx=null; _pe.ctxMenuIdx=null; _pe.history=[];
  _pe.bgImage=null; _pe.bgDataUrl=null;
  _pe.freehandCanvas=null; // forces a fresh canvas to be (re)built in initPiantinaCanvas
  _pe._savedFD=null; _pe._savedComps=null;
  _pe.lines=[]; _pe.selectedLineIdx=null; _pe.lineDragIdx=null;
  const old=document.getElementById('pe-ctx-menu'); if(old) old.remove();
  const oldDel=document.getElementById('pe-line-del-btn'); if(oldDel) oldDel.remove();
}

function onAddPiantina(){
  const n=(draft.piantine||[]).length;
  _peResetSession();
  _pe.editingPlanId=null;
  _pe.editingPlanNome=`Planimetria ${n+1}`;
  _pe.components=[];
  _pe._pendingCanvasW=900; _pe._pendingCanvasH=600;
  _pe._pendingBgDataUrl=null; _pe._pendingFreehandDataUrl=null;
  nav('piantinaEditor', {});
}

function onEditPiantina(id){
  const plan=(draft.piantine||[]).find(p=>p.id===id);
  if(!plan) return;
  _peResetSession();
  _pe.editingPlanId=plan.id;
  _pe.editingPlanNome=plan.nome||'';
  _pe.components=JSON.parse(JSON.stringify(plan.components||[]));
  _pe.lines=JSON.parse(JSON.stringify(plan.lines||[]));
  _pe._pendingCanvasW=plan.canvasW||900;
  _pe._pendingCanvasH=plan.canvasH||600;
  _pe._pendingBgDataUrl=plan.bgDataUrl||null;
  _pe._pendingFreehandDataUrl=plan.freehandDataUrl||null;
  nav('piantinaEditor', {});
}

function onDeletePiantina(id){
  if(!confirm('Eliminare questa planimetria annotata? L\'azione non è reversibile.')) return;
  draft.piantine=(draft.piantine||[]).filter(p=>p.id!==id);
  render();
  toast('Planimetria eliminata');
}

  const plans=draft.piantine||[];
  if(plans.length===0){
    return '<div style="font-size:12.5px;color:var(--text-dim);margin:2px 0 10px">Nessuna planimetria ancora annotata.</div>';
  }
  return '<div style="margin-bottom:8px">' + plans.map(p=>`
    <div class="client-item" style="margin-bottom:8px;cursor:pointer" onclick="onEditPiantina('${p.id}')">

    </div>`).join('') + '</div>';
}

// ---- Tool/color/comp state changes (no full re-render) ----
function setPETool(t){
  _pe.tool = (_pe.tool===t) ? null : t;   // tap the active tool again to deselect (pan mode)
  _pe.activeComp=null; _pe.movingIdx=null;
  const old=document.getElementById('pe-ctx-menu'); if(old) old.remove();
  _pe.ctxMenuIdx=null;
  _peUpdateUI();
}
function peIsInteractiveMode(){
  // true when the canvas should capture touches (drawing/placing/moving);
  // false means "pan mode" — touches should scroll the outer container instead.
  return !!(_pe.tool || _pe.activeComp || _pe.movingIdx!==null);
}
function peUpdateTouchAction(){
  if(_pe.canvas) _pe.canvas.style.touchAction = peIsInteractiveMode() ? 'none' : 'pan-x pan-y pinch-zoom';
}
function setPEColor(c){ _pe.color=c; _peUpdateUI(); }
function setPEThickness(v){ _pe.thickness=parseInt(v); }
function setPEComp(id){
  _pe.activeComp=(_pe.activeComp===id)?null:id;
  _pe.movingIdx=null;
  if(_pe.activeComp) _pe.ctxMenuIdx=null;
  const old=document.getElementById('pe-ctx-menu'); if(old) old.remove();
  _peUpdateUI();
}

// ---- Component palette: category dropdown + collapsible tray ----

function _peToggleBtnInner(){

function setPECat(catKey){

function togglePEPalette(){
