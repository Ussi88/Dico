name: Build Android APK

# Builds a debug APK of the app entirely in GitHub's cloud — no Android Studio or local
# Android SDK needed. After a run finishes, open it from the Actions tab and download the
# "app-debug-apk" artifact at the bottom of the page; that .zip contains app-debug.apk,
# ready to copy to a phone and install (the device needs "Install from unknown sources"
# allowed for whichever app you used to open the file).
#
# Versions checked against current official documentation/GitHub Marketplace listings
# in June 2026: AGP 8.13.2 / Kotlin 2.3.0 / Gradle 8.13 / JDK 17 / SDK Build Tools 35.0.0
# / compileSdk-targetSdk 36 (see app/build.gradle and build.gradle for sources).

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch: {}   # adds a manual "Run workflow" button on the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install required SDK platform & build-tools
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.13

      # No gradle-wrapper.jar is committed to the repo (it's a binary file, not something
      # that can be hand-written) — instead it's generated fresh on every run using the
      # Gradle version just provisioned above. From this point on, the build proceeds with
      # the conventional ./gradlew exactly like a normal local Android project would.
      - name: Generate the Gradle wrapper
        run: gradle wrapper --gradle-version 8.13 --distribution-type all

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
